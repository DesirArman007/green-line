<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   version="1.1"
   width="170"
   height="36"
   viewBox="0 0 170 36">
  <defs>
    <!-- Linear Gradients for the lowercase "tcs" stylized letters -->
    <linearGradient id="t-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E1B" />
      <stop offset="100%" stop-color="#E4002B" />
    </linearGradient>
    <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4002B" />
      <stop offset="100%" stop-color="#7A1E80" />
    </linearGradient>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A1E80" />
      <stop offset="100%" stop-color="#FF5C00" />
    </linearGradient>
  </defs>

  <g>
    <!-- Stylized 't' -->
    <path
       d="M 14,10 V 26 C 14,29.5 16.5,31.5 19.5,31.5 H 22.5"
       stroke="url(#t-grad)"
       stroke-width="4.2"
       stroke-linecap="round"
       fill="none" />
    <path
       d="M 8,15.5 H 19"
       stroke="url(#t-grad)"
       stroke-width="4.2"
       stroke-linecap="round"
       fill="none" />

    <!-- Stylized 'c' -->
    <path
       d="M 39,15.5 A 7,7 0 1 0 39,26.5"
       stroke="url(#c-grad)"
       stroke-width="4.2"
       stroke-linecap="round"
       fill="none" />

    <!-- Stylized 's' -->
    <path
       d="M 57,15.5 C 54,14 50.5,15 50.5,18 C 50.5,20.5 56,21 56,24 C 56,27 53,28 49.5,26.5"
       stroke="url(#s-grad)"
       stroke-width="4.2"
       stroke-linecap="round"
       fill="none" />

    <!-- TCS Corporate Text (3-line stack) -->
    <text
       x="70"
       y="14"
       font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-weight="900"
       font-size="9"
       fill="#005691"
       letter-spacing="0.4">TATA</text>
       
    <text
       x="70"
       y="22"
       font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-weight="600"
       font-size="6.5"
       fill="#005691"
       letter-spacing="0.2">CONSULTANCY</text>
       
    <text
       x="70"
       y="30"
       font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-weight="600"
       font-size="6.5"
       fill="#005691"
       letter-spacing="0.2">SERVICES</text>
  </g>
</svg>
